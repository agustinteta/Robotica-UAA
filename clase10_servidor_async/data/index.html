<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<style>
    body{
        background-color: grey;
    }

    #panel{
        display: flex;
        justify-content: center;
        align-items: center;
    }

    #led{
        width: 80px;
        height: 80px;
        border-radius: 100%;
        border: 2px solid;
        overflow: hidden;
        position: relative;
        margin-top: 30px;

        &::before, &::after{
            display: block;
            content: "";
            background-color: black;
            position: absolute;
            left:0;
            right:0;
            top:0;
            bottom:0;
            margin: auto;
            width: 80px;
            height: 2px;
        }

        &::before{
            transform: rotate(45deg);
        }
        &::after{
            
            transform: rotate(-45deg);
        }
    }

    #button{
        width: 100px;
        height: 100px;
        border-radius: 20px;
        box-shadow: 2px 2px 3px 2px rgb(21, 21, 21);
        position: absolute;
        left:0;
        right:0;
        top:0;
        bottom:0;
        margin:auto;
        background-color: rgb(70, 70, 70);

        &::after{
            width: 40px;
            height: 40px;
            display: block;
            content:"";
            border-radius: 100%;
            position: absolute;
            left:0;
            right:0;
            top:0;
            bottom:0;
            background-color: rgb(59, 59, 59);
            box-shadow: 2px 2px 0px 1px rgb(37, 37, 37);
            margin:auto;
        }
    }


    #button.activado{
        
        &::after{
            background-color: red;
            top:2px;
            bottom: -2px;
            left:1px;
            right: -1px;
            box-shadow: 1px 0px 0px 1px rgb(37, 37, 37);
        }
    }
    
</style>
<body style="height:100vh">
    <header style="background-color: white;">
        <!--<a href="index.html">AUTITO</a>-->
        <!--<a href="led.html">LED</a>-->
    </header>
    <div id="panel">
        <div id="led"></div>
        <div id="button"></div>
    </div>
</body>
<script>
    var boton_activado = false;

    var boton = document.querySelector("#button")
    var led = document.querySelector("#led")

    boton.onclick = ()=>{
        turnOffLed();
    }


    function turnOffLed(){

        boton_activado = !boton_activado

        //status_led = boton_activado //1 o 0
        var status_led = boton_activado ? 1 : 0;
        fetch(`/led_turnOff?led_status=${status_led ? 1:0}`)
         .then(response=>response.json())
        new Promise(resolve=>resolve())
        .then(response=>{
            if(boton_activado){
                boton.classList.add("activado");
                led.style.background = "yellow"

            }else{
                boton.classList.remove("activado") 
                led.style.background = "none"

            }
        })
        .catch((e)=>{
            boton_activado = !boton_activado //si falla, vuelve a como estaba
            console.log(`Hubo un error: ${e.message}`)
        });


    }
</script>
</html>
